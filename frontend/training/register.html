<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Training Registration</title>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav>
  <a href="../index.html" class="brand">
    <img src="../assets/logo2.png">
    <h1>I A Academy</h1>
  </a>
</nav>

<section class="reveal">
  <h2 class="section-title">Student Registration Form</h2>
  <p class="section-intro">
    Complete this form and proceed to payment to secure your admission.
  </p>

  <form id="registrationForm" class="glass form-grid" enctype="multipart/form-data">

    <!-- PERSONAL INFO -->
    <h3 class="form-section">Personal Information</h3>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" required>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" required>
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select id="gender" required>
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" id="dob" required>
    </div>

    <!-- ADDRESS -->
    <h3 class="form-section">Contact Details</h3>

    <div class="form-group full">
      <label>Home Address</label>
      <input type="text" id="address" required>
    </div>

    <!-- COURSE -->
    <h3 class="form-section">Training Details</h3>

    <div class="form-group full">
      <label>Select Course</label>
      <select id="course">
        <option value="Website Design Training">Website Design Training</option>
      </select>
    </div>

    <!-- PASSPORT -->
    <h3 class="form-section">Upload</h3>

    <div class="form-group full">
      <label>Upload Passport Photograph</label>
      <input type="file" id="passport" accept="image/*" required>
    </div>

    <!-- EMERGENCY -->
    <h3 class="form-section">Emergency Contact</h3>

    <div class="form-group">
      <label>Contact Name</label>
      <input type="text" id="emergencyName" required>
    </div>

    <div class="form-group">
      <label>Contact Phone</label>
      <input type="tel" id="emergencyPhone" required>
    </div>

    <!-- AGREEMENT -->
    <div class="form-group full">
      <label class="checkbox">
        <input type="checkbox" required>
        I confirm that the information provided is correct.
      </label>
    </div>

    <button type="submit" class="submit-btn">Register & Pay</button>

  </form>
</section>

<footer>
  © 2025 I A Computer Academy
</footer>

<script src="../js/main.js"></script>

<!-- Paystack -->
<script src="https://js.paystack.co/v1/inline.js"></script>

</body>
</html>
