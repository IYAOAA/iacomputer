<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Training Registration</title>

  <!-- Favicons -->
  <link rel="icon" type="../image/png" href="favicon5.png">
  <link rel="icon" href="../favicon5.png" type="image/png">
  <link rel="shortcut icon" href="../favicon5.png">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<nav>
  <a href="../index.html" class="brand">
    <img src="../assets/logo5.png">
    <h1>I A Academy</h1>
  </a>
</nav>

<section class="reveal">
  <h2 class="section-title">Student Registration Form</h2>
  <p class="section-intro">
    Complete this form and proceed to payment to secure your admission.
  </p>

  <form id="registrationForm" class="glass form-grid" enctype="multipart/form-data">

    <!-- PERSONAL INFO -->
    <h3 class="form-section">Personal Information</h3>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" required>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" required>
    </div>

    <div class="form-group">
      <label>Gender</label>
      <select id="gender" required>
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" id="dob" required>
    </div>

    <!-- ADDRESS -->
    <h3 class="form-section">Contact Details</h3>

    <div class="form-group full">
      <label>Home Address</label>
      <input type="text" id="address" required>
    </div>

    <!-- COURSE -->
    <h3 class="form-section">Training Details</h3>

    <div class="form-group full">
      <label>Select Course</label>
      <select id="course">
        <option value="Website Design Training">Website Design Training</option>
      </select>
    </div>

    <!-- PASSPORT -->
    <h3 class="form-section">Upload</h3>

    <div class="form-group full">
      <label>Upload Passport Photograph</label>
      <input type="file" id="passport" accept="image/*" required>
    </div>

    <!-- EMERGENCY -->
    <h3 class="form-section">Emergency Contact</h3>

    <div class="form-group">
      <label>Contact Name</label>
      <input type="text" id="emergencyName" required>
    </div>

    <div class="form-group">
      <label>Contact Phone</label>
      <input type="tel" id="emergencyPhone" required>
    </div>

    <!-- AGREEMENT -->
    <div class="form-group full">
      <label class="checkbox">
        <input type="checkbox" required>
        I confirm that the information provided is correct.
      </label>
    </div>

    <button type="submit" class="submit-btn">Register & Pay</button>

  </form>
</section>

<footer>
  © 2025 I A Computer Academy
</footer>

<script src="../js/main.js"></script>

<!-- Paystack -->
<script src="https://js.paystack.co/v1/inline.js"></script>

</body>
</html>

<script>
  const MAINTENANCE_MODE = true;

  // 🔧 CONFIG
  const launchDate = new Date("2026-04-01T00:00:00").getTime();
  const LOGO_SRC = "../../assets/logo.png"; // your logo path

  if (MAINTENANCE_MODE) {
    document.body.innerHTML = `
      <style>
        :root {
          --bg: #0b0f14;
          --card: #121822;
          --green: #39ff14;
          --text: #ffffff;
          --muted: #c4c4c4;
          --border: rgba(57,255,20,0.15);
        }

        body {
          margin: 0;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: var(--bg);
          color: var(--text);
          font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .box {
          background: var(--card);
          padding: 44px 36px;
          border-radius: 18px;
          max-width: 480px;
          width: 90%;
          text-align: center;
          border: 1px solid var(--border);
          box-shadow: 0 0 40px rgba(57,255,20,0.08);
        }

        .logo {
          max-width: 90px;
          margin-bottom: 18px;
        }

        h1 {
          font-size: 2.2rem;
          margin-bottom: 10px;
        }

        .accent {
          color: var(--green);
        }

        p {
          color: var(--muted);
          line-height: 1.6;
          margin-bottom: 28px;
        }

        .countdown {
          display: flex;
          justify-content: center;
          gap: 14px;
        }

        .time {
          background: rgba(255,255,255,0.02);
          border: 1px solid var(--border);
          padding: 14px 16px;
          border-radius: 12px;
          min-width: 72px;
        }

        .time span {
          display: block;
          font-size: 1.9rem;
          font-weight: 700;
          color: var(--green);
        }

        .label {
          font-size: 0.7rem;
          letter-spacing: 1px;
          margin-top: 4px;
          color: var(--muted);
        }

        .small {
          margin-top: 24px;
          font-size: 0.8rem;
          color: var(--muted);
          opacity: 0.7;
        }
      </style>

      <div class="box">
        <img src="${LOGO_SRC}" alt="Academy Logo" class="logo" />
<div class="hero-watermark"></div>
        <h1>Coming <span class="accent">Soon</span></h1>
        <p>
          This section is under maintenance.<br />
          We’re building something purposeful.
        </p>

        <div class="countdown">
          <div class="time">
            <span id="days">00</span>
            <div class="label">DAYS</div>
          </div>
          <div class="time">
            <span id="hours">00</span>
            <div class="label">HOURS</div>
          </div>
          <div class="time">
            <span id="minutes">00</span>
            <div class="label">MINUTES</div>
          </div>
          <div class="time">
            <span id="seconds">00</span>
            <div class="label">SECONDS</div>
          </div>
        </div>

        <div class="small">
          © 2025 I A Computer Academy
        </div>
      </div>
    `;

    const timer = setInterval(() => {
      const now = Date.now();
      const distance = launchDate - now;

      if (distance < 0) {
        clearInterval(timer);
        document.querySelector(".countdown").innerHTML =
          "<strong class='accent'>We are live 🚀</strong>";
        return;
      }

      document.getElementById("days").textContent =
        Math.floor(distance / (1000 * 60 * 60 * 24));
      document.getElementById("hours").textContent =
        Math.floor((distance / (1000 * 60 * 60)) % 24).toString().padStart(2, "0");
      document.getElementById("minutes").textContent =
        Math.floor((distance / (1000 * 60)) % 60).toString().padStart(2, "0");
      document.getElementById("seconds").textContent =
        Math.floor((distance / 1000) % 60).toString().padStart(2, "0");
    }, 1000);
  }
</script>
